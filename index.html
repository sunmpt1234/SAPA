<script>
  const apiUrl = "https://script.google.com/macros/s/AKfycbyMcUugHpaBjmv6u19Ho56ILLRnT9L5MCdfoGzDf0e2OckFY9eKQW8Mb6gj4RBSBdqcjA/exec";

  function refreshData() {
    fetch(apiUrl)
      .then(response => response.json())
      .then(res => {
        // อัปเดตตัวเลขบนหน้าจอ GitHub
        document.getElementById('total-count').innerText = res.total;
        document.getElementById('filled-count').innerText = res.filled;
      })
      .catch(err => console.error("Error:", err));
  }
    
  window.onload = function() {
    refreshData();
    setInterval(refreshData, 30000); 
  };
</script>
